<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
<title>LonelyNathan</title>
<link rel="stylesheet" href="shared.css">
<style>
  html, body { -webkit-app-region: drag; }

  /* ── Wrapper ── */
  .wrapper { padding: 32px; }

  /* ── App icon ── */
  .app-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    margin-bottom: 16px;
    animation: fadeIn .8s ease-out both;
    filter: drop-shadow(0 4px 16px rgba(255,109,90,.2));
  }

  /* ── Brand ── */
  .brand {
    margin-bottom: 6px;
    animation: fadeIn .6s .05s ease-out both;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: .04em;
  }

  .version-badge {
    margin-bottom: 36px;
    position: relative;
  }
  .version-badge.has-update {
    -webkit-app-region: no-drag;
    cursor: pointer;
    transition: border-color .15s;
  }
  .version-badge.has-update:hover { border-color: var(--accent); }

  .update-dot {
    display: none;
    position: absolute;
    top: -3px;
    right: -3px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
  }
  .version-badge.has-update .update-dot {
    display: block;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
  }

  /* ── Card ── */
  .card {
    position: relative;
    width: 100%; max-width: 680px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    box-shadow: var(--card-shadow);
    animation: fadeSlideIn .6s .15s ease-out both;
  }

  /* ── Progress ── */
  .progress-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 32px 16px;
  }

  .loader {
    width: 40px; height: 40px;
    position: relative;
  }
  .loader svg {
    width: 100%; height: 100%;
    animation: spinRing 1.4s linear infinite;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }

  .loader .track { stroke: var(--border); }
  .loader .arc   { stroke: var(--accent); stroke-linecap: round; }

  .loader.error svg { animation: none; }
  .loader.error .arc   { stroke: var(--red-alert); stroke-dasharray: 126; stroke-dashoffset: 0; }
  .loader.error .track { stroke: rgba(239,68,68,.2); }

  #status-text {
    font-size: 13px; font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: .02em;
    line-height: 1.4;
    text-align: center;
  }
  #status-text.error { color: var(--red-alert); }

  #log-line {
    font-size: 11.5px;
    color: var(--text-dim);
    letter-spacing: .02em;
    text-align: center;
    min-height: 1.4em;
    max-width: 580px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Retry button ── */
  .retry-wrap {
    display: none;
    margin-top: 20px;
    text-align: center;
    animation: fadeIn .3s ease-out both;
  }
  .retry-wrap.visible { display: block; }

  #retry-btn {
    -webkit-app-region: no-drag;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 400;
    padding: 9px 24px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--accent-dim);
    color: var(--accent);
    cursor: pointer;
    letter-spacing: .04em;
    text-transform: lowercase;
    transition: all .15s;
  }
  #retry-btn:hover {
    background: rgba(255,109,90,.25);
    box-shadow: 0 0 16px rgba(255,109,90,.2);
  }
  #retry-btn:active { transform: scale(.97); }

  .install-link {
    display: none;
    font-size: 11.5px;
    color: var(--text-dim);
    text-decoration: underline;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }
  .install-link.visible { display: block; }

  /* ── Close button ── */
  .close-btn {
    -webkit-app-region: no-drag;
    position: fixed;
    top: 14px; right: 16px;
    z-index: 10;
    width: 28px; height: 28px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    line-height: 28px;
    text-align: center;
    cursor: pointer;
    border-radius: 6px;
    transition: all .15s;
  }
  .close-btn:hover {
    background: var(--hover-subtle);
    color: var(--text-primary);
  }

  /* ── GPU prompt ── */
  .gpu-prompt {
    display: none;
    flex-direction: column;
    gap: 20px;
    padding: 8px 4px 4px;
    animation: fadeSlideIn .25s ease-out both;
  }
  .gpu-prompt.visible { display: flex; }

  .gpu-prompt-intro {
    font-size: 12.5px;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.5;
  }
  .gpu-prompt-intro strong { color: var(--text-primary); }

  .gpu-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .gpu-option {
    -webkit-app-region: no-drag;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s, transform .1s;
    font-family: inherit;
    color: var(--text-primary);
  }
  .gpu-option:hover { background: var(--hover-subtle); border-color: var(--border-light); }
  .gpu-option:active { transform: scale(.98); }

  .gpu-option--gpu {
    border-color: rgba(255,109,90,.35);
    background: rgba(255,109,90,.04);
  }
  .gpu-option--gpu:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .gpu-option-icon { color: var(--text-dim); }
  .gpu-option--gpu .gpu-option-icon { color: var(--accent); }

  .gpu-option-name {
    font-size: 12.5px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
  }

  .gpu-rec-badge {
    font-size: 10px;
    font-weight: 400;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(255,109,90,.3);
    border-radius: 3px;
    padding: 1px 6px;
    letter-spacing: .04em;
    text-transform: lowercase;
  }

  .gpu-option-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.55;
  }

  .gpu-prompt-note {
    font-size: 10.5px;
    color: var(--text-dim);
    text-align: center;
  }
  .gpu-prompt-note code {
    font-family: inherit;
    background: var(--hover-subtle);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0 4px;
  }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <button class="close-btn" id="close-btn" title="Quit">&times;</button>
  <div class="bg"></div>
  <div class="wrapper">

    <img class="app-icon" src="assets/icon.png" alt="">
    <div class="brand">LonelyNathan</div>
    <div class="version-badge" id="version"><span id="version-text">v—</span><span class="update-dot"></span></div>

    <div class="card">
      <div class="progress-area" id="progress-area">
        <div class="loader" id="loader">
          <svg viewBox="0 0 44 44" fill="none">
            <circle class="track" cx="22" cy="22" r="20" stroke-width="2.5" fill="none"/>
            <circle class="arc"   cx="22" cy="22" r="20" stroke-width="2.5" fill="none"
                    stroke-dasharray="126" stroke-dashoffset="94"/>
          </svg>
        </div>
        <div id="status-text">initializing…</div>
        <a id="docker-install-link" class="install-link">Install Docker</a>
        <div id="log-line"></div>
      </div>

      <div class="gpu-prompt" id="gpu-prompt">
        <div class="gpu-prompt-intro">
          <strong id="gpu-detected-name">GPU</strong> detected &mdash; choose how to run AI inference
        </div>
        <div class="gpu-options">
          <button class="gpu-option gpu-option--gpu" id="gpu-opt-hardware">
            <div class="gpu-option-icon">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                <path d="M11 2L4 11h6l-1 7 7-9h-6l1-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="gpu-option-name">
              <span id="gpu-opt-hw-label">GPU</span>
              <span class="gpu-rec-badge">recommended</span>
            </div>
            <div class="gpu-option-desc">Significantly faster inference. Models respond quicker, especially larger ones. Requires working GPU drivers.</div>
          </button>
          <button class="gpu-option" id="gpu-opt-cpu">
            <div class="gpu-option-icon">
              <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                <rect x="4" y="4" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
                <rect x="7" y="7" width="6" height="6" rx=".5" stroke="currentColor" stroke-width="1"/>
                <line x1="7" y1="1.5" x2="7" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="10" y1="1.5" x2="10" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="13" y1="1.5" x2="13" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="7" y1="16" x2="7" y2="18.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="10" y1="16" x2="10" y2="18.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="13" y1="16" x2="13" y2="18.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="1.5" y1="7" x2="4" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="1.5" y1="10" x2="4" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="1.5" y1="13" x2="4" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="16" y1="7" x2="18.5" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="16" y1="10" x2="18.5" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="16" y1="13" x2="18.5" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="gpu-option-name">CPU only</div>
            <div class="gpu-option-desc">Compatible with any machine. Slower inference but no GPU driver dependency. Good fallback if you hit issues.</div>
          </button>
        </div>
        <div class="gpu-prompt-note">This choice is saved permanently. To reset it, delete <code>.gpu-preference</code> from your app data folder.</div>
      </div>

      <div class="retry-wrap" id="retry-wrap">
        <button id="retry-btn">retry</button>
      </div>
    </div>

  </div>

  <script type="module" src="./loader.ts"></script>
</body>
</html>
